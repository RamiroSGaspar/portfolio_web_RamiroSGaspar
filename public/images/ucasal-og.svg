<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -10.5 690 388.125" preserveAspectRatio="xMidYMid slice" role="img" aria-label="UCASAL: Expectativa vs Realidad">
<title>UCASAL: Expectativa vs Realidad</title>
<desc>Encuesta anonima para alumnos de UCASAL - proyecto personal</desc>

<defs>
  <linearGradient id="brandGrad" x1="0" x2="1" y1="0" y2="0">
    <stop offset="0" stop-color="#e11d48"/>
    <stop offset="1" stop-color="#14b8a6"/>
  </linearGradient>
  <linearGradient id="brandGradRev" x1="0" x2="1" y1="0" y2="0">
    <stop offset="0" stop-color="#14b8a6"/>
    <stop offset="1" stop-color="#e11d48"/>
  </linearGradient>
</defs>

<rect x="0" y="-10.5" width="690" height="388.125" fill="#18181b"/>
<rect x="0" y="-10.5" width="690" height="3" fill="url(#brandGrad)"/>

<!-- LADO IZQUIERDO: REFERENCIAS UNIVERSITARIAS -->
<g opacity="0.16" stroke="#a1a1aa" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">

  <g transform="translate(80, 80)">

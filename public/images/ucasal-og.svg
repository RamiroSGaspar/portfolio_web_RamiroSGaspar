<image x="305" y="60" width="80" height="78" preserveAspectRatio="xMidYMid slice" href="/images/ucasal-logo.png"/>

<!-- TITULO en una linea con dos partes -->
<text x="228.4" y="200" text-anchor="end" font-family="Inter, system-ui, sans-serif" font-size="26" font-weight="700" fill="#ffffff">UCASAL:</text>
<text x="237.4" y="200" text-anchor="start" font-family="Inter, system-ui, sans-serif" font-size="26" font-weight="700" fill="url(#brandGrad)">Expectativa vs Realidad</text>


    <line x1="32"  y1="0" x2="32"  y2="32"/>
    <line x1="-42" y1="32" x2="42" y2="32" stroke-width="2"/>
  </g>

</g>

<!-- LADO DERECHO: REFERENCIAS ANALISIS DE DATOS -->
<g opacity="0.16" stroke="#a1a1aa" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">

  <g transform="translate(580, 60)">
    <line x1="0" y1="0" x2="0" y2="60"/>
    <line x1="0" y1="60" x2="85" y2="60"/>
    <rect x="7"  y="35" width="14" height="25"/>
    <rect x="25" y="18" width="14" height="42"/>
    <rect x="43" y="10" width="14" height="50"/>
